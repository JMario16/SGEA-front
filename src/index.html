<!DOCTYPE html>
<html lang="es">

<head>
    <!-- Metadatos -->
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Archivo generado css tailwind -->
    <link href="./output.css" rel="stylesheet">

    <!-- Título y logo -->
    <title>Iniciar sesión - Sereno</title>
</head>

<body>
    <section class="bg-gray-50"><div class="flex flex-col items-center justify-center px-6 py-8 mx-auto md:h-screen lg:py-0">
        <a href="index.html" class="flex items-center mb-6 text-2xl font-semibold text-gray-900"><img class="size-16 rounded-xl mr-3" src="assets/logo_cuadrado.jpeg" alt="logo">Sereno</a>
        
        <div class="w-full bg-white rounded-lg shadow md:mt-0 sm:max-w-md xl:p-0">
            <div class="p-6 space-y-4 md:space-y-6 sm:p-8">
                <h1 class="text-xl font-bold leading-tight tracking-tight text-gray-900 md:text-2xl">Iniciar sesión</h1>
                <form class="space-y-4 md:space-y-6">
                    <div>
                        <label for="email" class="block mb-2 text-sm font-medium text-gray-900">Correo electrónico</label>
                        <input type="email" name="email" id="email" class="bg-gray-50 border border-gray-300 text-gray-900 rounded-lg block w-full p-2.5" placeholder="ejemplo@email.com" required="">
                    </div>
                    <div>
                        <label for="password" class="block mb-2 text-sm font-medium text-gray-900">Contraseña</label>
                        <input type="password" name="password" id="password" placeholder="••••••••" class="bg-gray-50 border border-gray-300 text-gray-900 rounded-lg block w-full p-2.5" required="">
                    </div>
                    <div class="flex items-center justify-between">
                        <div class="flex items-start">
                            <div class="flex items-center h-5">
                                <input id="remember" aria-describedby="remember" type="checkbox" class="w-4 h-4 border border-gray-300 rounded bg-gray-50">
                            </div>
                            <div class="ml-3 text-sm">
                                <label for="remember" class="text-gray-500">Recordar contraseña</label>
                            </div>
                        </div>
                        <a href="recover_password.html" class="text-sm font-medium text-gray-500 hover:underline">Olvidaste tu contraseña?</a>
                    </div>
                    <button type="submit" id="loginBtn" onclick="login()" class="w-full text-gray-900 bg-gray-50 border border-gray-300 hover:bg-gray-300 font-medium rounded-lg text-sm px-5 py-2.5 text-center">Iniciar sesión</button>
                    <p class="text-sm font-light text-gray-500">
                        Aún no tienes una cuenta? <a href="register.html" class="font-medium text-gray-500 hover:underline">Crear cuenta</a>
                    </p>
                </form>
            </div>
        </div>

    </div></section>
</body>

<!-- Scripts -->
<script type="module" src="js/login.js"></script>

</html>
