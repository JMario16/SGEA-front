<!DOCTYPE html>
<html lang="es">

<head>
    <!-- Metadatos -->
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Archivo generado css tailwind -->
    <link href="./output.css" rel="stylesheet">

    <!-- Título y logo -->
    <title>Encuesta inicial - Sereno</title>
</head>

<body class="bg-gray-50">
    <section class="flex flex-col items-center justify-center px-6 py-8 mx-auto md:h-screen lg:py-0">
        <a href="index.html" class="flex items-center mb-6 text-2xl font-semibold text-gray-900"><img class="size-16 rounded-xl mr-3" src="assets/logo_cuadrado.jpeg" alt="logo">Sereno</a>
        <div class="w-full rounded-lg shadow md:mt-0 sm:max-w-xl xl:p-0 bg-white"><div class="p-6 space-y-4 md:space-y-6 sm:p-8">

            <h2 class="text-xl font-bold leading-tight tracking-tight text-gray-900 md:text-2xl">Bienvenido a Sereno!</h2>
            <p class="mb-6 text-sm font-medium text-gray-900 text-justify">Sereno es un Task Manager enfocado a estudiantes con el objetivo de manejar y reducir el estrés escolar, por ello, es necesario que contestes una breve encuesta antes de comenzar.</p>
            <form class="space-y-4 md:space-y-6">
                <div class="grid gap-4 sm:grid-cols-2 sm:gap-6">
                    <div class="w-full">
                        <label for="institucion" class="block mb-2 text-sm font-medium text-gray-900">Intitución</label>
                        <input type="text" name="institucion" id="institucion" class="bg-gray-50 border border-gray-300 text-gray-900 rounded-lg block w-full p-2.5" placeholder="Institución" required="">
                    </div>
                    <div class="w-full">
                        <label for="carrera" class="block mb-2 text-sm font-medium text-gray-900">Carrera</label>
                        <input type="text" name="carrera" id="carrera" class="bg-gray-50 border border-gray-300 text-gray-900 rounded-lg block w-full p-2.5" placeholder="Carrera" required="">
                    </div>
                    <div class="w-full">
                        <label for="semestre" class="block mb-2 text-sm font-medium text-gray-900">Semestre</label>
                        <input type="number" name="semestre" id="semestre" class="bg-gray-50 border border-gray-300 text-gray-900 rounded-lg block w-full p-2.5" placeholder="Semestre" required="">
                    </div>
                    <div class="w-full">
                        <label for="promedio" class="block mb-2 text-sm font-medium text-gray-900">Promedio (opcional)</label>
                        <input type="number" step="0.01" name="promedio" id="promedio" class="bg-gray-50 border border-gray-300 text-gray-900 rounded-lg block w-full p-2.5" placeholder="Promedio general">
                    </div>
                </div>
                <button type="submit" id="academicBtn" onclick="save_academic()" class="w-full text-gray-900 bg-gray-50 border border-gray-300 hover:bg-gray-300 font-medium rounded-lg text-sm px-5 py-2.5 text-center">Siguiente</button>
                <p class="text-sm font-light text-gray-500">
                    Volver a <a href="index.html" class="font-medium text-gray-500 hover:underline">inicio</a>
                </p>
            </form>
        </div>

    </div></section>
</body>

<!-- Scripts -->
<script src="js/onboarding_1.js"></script>

</html>
